<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syllabus Decoder | Admin Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-2xl);
      padding: var(--space-12) var(--space-10);
      box-shadow: var(--shadow-lg);
    }
    .login-card__brand {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--blue);
      margin-bottom: var(--space-8);
      display: block;
    }
    .login-card h1 { font-size: 1.75rem; margin-bottom: var(--space-2); }
    .login-card .subtitle {
      color: var(--ink-4);
      font-size: 0.875rem;
      margin-bottom: var(--space-8);
      max-width: none;
    }
    .form-stack { display: flex; flex-direction: column; gap: var(--space-5); }
    .back-link {
      background: none;
      border: none;
      color: var(--ink-4);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      margin-top: var(--space-2);
      display: inline-block;
    }
    .back-link:hover { color: var(--ink); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card fade-up" style="position: relative;">

    <a href="/" style="position: absolute; top: var(--space-4); right: var(--space-4); font-size: 1.5rem; color: var(--ink-3); text-decoration: none;">✕</a>

    <span class="login-card__brand">Syllabus Decoder</span>
    <h1>Admin <span class="accent" style="color:var(--blue)">Access</span></h1>
    <p class="subtitle" id="subtitle">Enter your email to continue.</p>

    <div id="error-box" class="alert alert--error mb-6 hidden"></div>

    <!-- email entry -->
    <div id="step-email" class="form-stack">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email-input" placeholder="admin@school.edu">
      </div>
      <button class="btn btn--primary btn--full" id="email-btn">Continue</button>
    </div>

    <!-- returning admin, enter password -->
    <div id="step-password" class="form-stack hidden">
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password-input" placeholder="••••••••">
      </div>
      <button class="btn btn--primary btn--full" id="login-btn">Sign In</button>
      <button class="back-link" id="back-from-password">← Use a different email</button>
    </div>

    <!-- first-time admin, create a password -->
    <div id="step-create" class="form-stack hidden">
      <p style="font-size:0.85rem;color:var(--ink-3);max-width:none;">
        Your email is authorized. Create a password to set up your account.
      </p>
      <div class="form-group">
        <label class="form-label">Create Password</label>
        <input class="form-input" type="password" id="new-password-input" placeholder="At least 8 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" id="confirm-password-input" placeholder="Repeat password">
      </div>
      <button class="btn btn--primary btn--full" id="set-password-btn">Create Password & Sign In</button>
      <button class="back-link" id="back-from-create">← Use a different email</button>
    </div>

  </div>
</div>

<script>
  let authorizedEmail = "";

  function showError(msg) {
    const box = document.getElementById("error-box");
    box.textContent = msg;
    box.classList.remove("hidden");
  }

  function clearError() {
    document.getElementById("error-box").classList.add("hidden");
  }

  function showStep(step) {
    ["step-email", "step-password", "step-create"].forEach(id =>
      document.getElementById(id).classList.add("hidden")
    );
    document.getElementById(step).classList.remove("hidden");
    clearError();
  }

  function resetToEmail() {
    authorizedEmail = "";
    document.getElementById("email-input").value = "";
    document.getElementById("password-input").value = "";
    document.getElementById("new-password-input").value = "";
    document.getElementById("confirm-password-input").value = "";
    document.getElementById("subtitle").textContent = "Enter your email to continue.";
    showStep("step-email");
  }

  // check email against authorized list
  document.getElementById("email-btn").addEventListener("click", async () => {
    const email = document.getElementById("email-input").value.trim();
    if (!email) { showError("Please enter your email."); return; }

    clearError();
    const btn = document.getElementById("email-btn");
    btn.disabled = true;
    btn.textContent = "Checking…";

    try {
      const res  = await fetch("/api/auth/check-email", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || "Not authorized.");
        btn.disabled = false;
        btn.textContent = "Continue";
        return;
      }

      authorizedEmail = email;

      if (data.status === "no_password") {
        // First time logging in, go to password creation step
        document.getElementById("subtitle").textContent = "Welcome. Set up your admin password.";
        showStep("step-create");
      } else {
        // Returning admin, go to password entry step
        document.getElementById("subtitle").textContent = `Signing in as ${email}`;
        showStep("step-password");
      }

    } catch {
      showError("Could not connect to server.");
    }

    btn.disabled = false;
    btn.textContent = "Continue";
  });

  // sign in with existing password
  document.getElementById("login-btn").addEventListener("click", async () => {
    const password = document.getElementById("password-input").value;
    if (!password) { showError("Please enter your password."); return; }

    const btn = document.getElementById("login-btn");
    btn.disabled = true;
    btn.textContent = "Signing in…";

    try {
      const res  = await fetch("/api/auth/login", {
        method:      "POST",
        headers:     { "Content-Type": "application/json" },
        credentials: "include",
        body:        JSON.stringify({ email: authorizedEmail, password }),
      });
      const data = await res.json();

      if (!res.ok) { showError(data.error || "Login failed."); btn.disabled = false; btn.textContent = "Sign In"; return; }
      window.location.href = "/admin";

    } catch {
      showError("Could not connect to server.");
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  });

  // set password for first-time admin
  document.getElementById("set-password-btn").addEventListener("click", async () => {
    const password = document.getElementById("new-password-input").value;
    const confirm  = document.getElementById("confirm-password-input").value;

    if (!password || !confirm) { showError("Please fill in both fields."); return; }
    if (password !== confirm)  { showError("Passwords do not match."); return; }
    if (password.length < 8)   { showError("Password must be at least 8 characters."); return; }

    const btn = document.getElementById("set-password-btn");
    btn.disabled = true;
    btn.textContent = "Setting up…";

    try {
      const res  = await fetch("/api/auth/set-password", {
        method:      "POST",
        headers:     { "Content-Type": "application/json" },
        credentials: "include",
        body:        JSON.stringify({ email: authorizedEmail, password }),
      });
      const data = await res.json();

      if (!res.ok) { showError(data.error || "Could not set password."); btn.disabled = false; btn.textContent = "Create Password & Sign In"; return; }
      window.location.href = "/admin";

    } catch {
      showError("Could not connect to server.");
      btn.disabled = false;
      btn.textContent = "Create Password & Sign In";
    }
  });

  // Back buttons go back to email step
  document.getElementById("back-from-password").addEventListener("click", resetToEmail);
  document.getElementById("back-from-create").addEventListener("click", resetToEmail);

  //Can press Enter to advance
  document.getElementById("email-input").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("email-btn").click();
  });
  document.getElementById("password-input").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("login-btn").click();
  });
</script>

</body>
</html>
