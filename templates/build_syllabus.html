<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus Decoder | Policy Builder</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
      .builder-wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
      .builder-header { text-align: center; margin-bottom: 40px; }
      .builder-header h1 { font-size: 2.5rem; margin-bottom: 8px; }
      .builder-header p { color: var(--ink-3); font-size: 1.1rem; }
      
      .progress-section { margin-bottom: 30px; }
      .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      .progress-label .step-text { font-weight: 600; font-size: 0.85rem; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.5px; }
      .progress-label .step-pct { font-size: 0.9rem; color: var(--blue); font-weight: 600; }
      .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
      .progress-fill { height: 100%; background: var(--blue); transition: width 0.3s ease; }
      
      .question-view { min-height: 400px; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 12px; }
      .question-content h2 { margin: 0 0 20px 0; font-size: 1.5rem; }
      .options-stack { display: flex; flex-direction: column; gap: 16px; margin: 30px 0; }
      .option-card { display: flex; gap: 16px; padding: 16px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
      .option-card:hover { border-color: var(--blue); background: var(--bg-2); }
      .option-card input { flex-shrink: 0; margin-top: 4px; cursor: pointer; width: 20px; height: 20px; }
      .option-card input:checked ~ .option-text { color: var(--blue); }
      .option-card input:checked { border-color: var(--blue); }
      .option-text { flex: 1; }
      .option-text strong { display: block; margin-bottom: 4px; }
      .option-text small { color: var(--ink-4); }
      
      .controls { display: flex; justify-content: space-between; gap: 12px; margin-top: 30px; }
      .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
      .btn--secondary { background: transparent; color: var(--ink-3); border: 1px solid var(--border); }
      .btn--secondary:hover:not(:disabled) { color: var(--ink); border-color: var(--ink-3); }
      .btn--primary { background: var(--blue); color: white; flex: 1; }
      .btn--primary:hover:not(:disabled) { opacity: 0.9; }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }
      
      .result-section { text-align: center; padding: 40px; background: var(--bg-2); border-radius: 12px; }
      .result-section h2 { color: var(--blue); margin-bottom: 20px; }
      .result-text { padding: 20px; background: white; border-radius: 8px; text-align: left; line-height: 1.6; margin-bottom: 20px; font-size: 0.95rem; }
      .result-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
      .result-meta-item { padding: 12px; background: var(--bg-1); border-radius: 6px; }
      .result-meta-item label { font-size: 0.75rem; color: var(--ink-3); text-transform: uppercase; }
      .result-meta-item strong { display: block; font-size: 1.2rem; color: var(--blue); }
      
      .hidden { display: none; }
      .course-input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; }
    </style>
</head>
<body>

  <nav class="main-nav">
    <div class="logo"><a href="/">Syllabus Decoder</a></div>
    <div class="nav-links">
      <a href="/decoder">Decoder</a>
      <a href="/buildsyllabus">Policy Builder</a>
      <a href="/traininggame">Training Game</a>
      <a href="/admin">Admin</a>
    </div>
  </nav>

  <main class="builder-wrap">
    <div class="builder-header">
      <h1>Policy <span style="color: var(--blue);">Builder</span></h1>
      <p>Define your values & make a custom AI policy.</p>
    </div>

    <!-- Quiz View -->
    <div id="quiz-view">
      <div class="progress-section">
        <div class="progress-label">
          <span class="step-text" id="step-label">Loading...</span>
          <span class="step-pct" id="step-pct">0% complete</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
        </div>
      </div>

      <div class="question-view">
        <div class="question-content">
          <h2 id="question-text"></h2>
          <div class="options-stack" id="options-container"></div>
        </div>

        <div class="controls">
          <button class="btn btn--secondary" id="back-btn" onclick="prevQuestion()">← Back</button>
          <button class="btn btn--primary" id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
        </div>
      </div>
    </div>

    <!-- Result View -->
    <div id="result-view" class="hidden">
      <div class="result-section">
        <h2>Your AI Policy</h2>
        
        <!-- Glow Card Display for T/C/E -->
        <div style="margin-bottom: 40px;">
          <div class="glow-card-row row-3" style="grid-template-columns: repeat(3, 1fr); gap: 20px;">
            <div class="glow-card" id="card-t">
              <div class="glow-card__title" id="tier-display">T0</div>
              <div class="glow-card__content" id="tier-definition" style="max-height: 400px; opacity: 1; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">Tier Definition</div>
            </div>
            <div class="glow-card" id="card-c">
              <div class="glow-card__title" id="compliance-display">C0</div>
              <div class="glow-card__content" id="compliance-definition" style="max-height: 400px; opacity: 1; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">Compliance Definition</div>
            </div>
            <div class="glow-card" id="card-e">
              <div class="glow-card__title" id="enforcement-display">E0</div>
              <div class="glow-card__content" id="enforcement-definition" style="max-height: 400px; opacity: 1; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">Enforcement Definition</div>
            </div>
          </div>
        </div>
        
        <div class="result-text" id="policy-text"></div>

        <div class="controls">
          <button class="btn btn--secondary" onclick="backToQuiz()">← Edit Answers</button>
          <button class="btn btn--primary" id="copy-btn" onclick="copyPolicy()">📋 Copy to Clipboard</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    let questions = [];
    let currentStep = 0;
    let answers = {}; // { step_number: "option_value" }
    let lastGeneratedPolicy = null;

    // T/C/E Definitions
    const TIER_DEFINITIONS = {
      "T0": "Prohibited - All AI use is banned",
      "T1": "Discouraged - Use not recommended",
      "T2": "Permission-Required - Must ask first",
      "T3": "Bounded Use - Allowed for specific tasks",
      "T4": "Documented Use - Permitted with logs",
      "T5": "Unrestricted - Welcomed or encouraged",
    };

    const COMPLIANCE_DEFINITIONS = {
      "C0": "None - No disclosure required",
      "C1": "Minimal - Brief mention needed",
      "C2": "Structured - Formal citation required",
      "C3": "Full Audit - Prompt logs & reflections",
    };

    const ENFORCEMENT_DEFINITIONS = {
      "E0": "Trust-Based - Reliant on integrity",
      "E1": "Instructive - Warnings provided",
      "E2": "Investigative - Detection tools used",
    };

    async function loadQuestions() {
      try {
        const response = await fetch('/api/builder/questions');
        questions = await response.json();
        
        if (questions.length > 0) {
          showQuestion(0);
        } else {
          document.getElementById('question-text').textContent = 'No questions found. Please contact an administrator.';
        }
      } catch (e) {
        console.error('Error loading questions:', e);
        document.getElementById('question-text').textContent = 'Error loading questions.';
      }
    }

    function showQuestion(stepIndex) {
      currentStep = stepIndex;
      const q = questions[stepIndex];
      
      // Update progress - calculate based on actual questions length, not step count
      const pct = Math.round((stepIndex / questions.length) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('step-label').textContent = `Step ${stepIndex + 1} of ${questions.length}: ${q.category}`;
      document.getElementById('step-pct').textContent = pct + '% complete';

      // Show question
      document.getElementById('question-text').textContent = q.question;

      // Build options
      const container = document.getElementById('options-container');
      container.innerHTML = '';
      
      ['a', 'b', 'c'].forEach(letter => {
        const optionKey = `option_${letter}`;
        const titleKey = `${optionKey}_title`;
        const descKey = `${optionKey}_desc`;
        const valueKey = `${optionKey}_value`;

        if (!q[titleKey]) return; // Skip if option doesn't exist

        const value = q[valueKey];
        const isChecked = answers[q.step_number] === value;

        const html = `
          <label class="option-card" style="border-color: ${isChecked ? 'var(--blue)' : 'var(--border)'}; background: ${isChecked ? 'var(--bg-2)' : 'transparent'};">
            <input type="radio" name="answer_${q.step_number}" value="${value}" ${isChecked ? 'checked' : ''} 
              onchange="selectAnswer(${q.step_number}, '${value}')">
            <span class="option-text">
              <strong>${q[titleKey]}</strong>
              <small>${q[descKey]}</small>
            </span>
          </label>
        `;
        container.innerHTML += html;
      });

      // Update button states
      document.getElementById('back-btn').disabled = stepIndex === 0;
      document.getElementById('next-btn').disabled = !answers[q.step_number];
      document.getElementById('next-btn').textContent = stepIndex === questions.length - 1 ? 'Generate Policy' : 'Next Question';
    }

    function selectAnswer(stepNumber, value) {
      answers[stepNumber] = value;
      document.getElementById('next-btn').disabled = false;
    }

    function prevQuestion() {
      if (currentStep > 0) {
        showQuestion(currentStep - 1);
      }
    }

    function nextQuestion() {
      if (currentStep < questions.length - 1) {
        showQuestion(currentStep + 1);
      } else {
        // All questions answered, generate policy
        generateAndShowPolicy();
      }
    }

    async function generateAndShowPolicy() {
      // Collect all 3 answers
      const answer_1 = answers[questions[0].step_number];
      const answer_2 = answers[questions[1].step_number];
      const answer_3 = answers[questions[2].step_number];
      
      console.log("DEBUG: Generated payload:", {
        answer_1: answer_1,
        answer_2: answer_2,
        answer_3: answer_3
      });
      
      if (!answer_1 || !answer_2 || !answer_3) {
        alert('Please answer all three questions before generating policy.');
        return;
      }
      
      try {
        const payload = {
          answer_1: answer_1,
          answer_2: answer_2,
          answer_3: answer_3
        };
        
        console.log("DEBUG: Sending to /api/builder/generate:", JSON.stringify(payload));
        
        const res = await fetch('/api/builder/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        console.log("DEBUG: Response status:", res.status);
        
        if (!res.ok) {
          const errorData = await res.json();
          console.log("DEBUG: Error response:", errorData);
          alert('Failed to generate policy: ' + (errorData.error || 'Unknown error'));
          return;
        }
        
        lastGeneratedPolicy = await res.json();
        console.log("DEBUG: Success response:", lastGeneratedPolicy);
        showResult();
      } catch (e) {
        console.error('Error generating policy:', e);
        alert('Failed to generate policy. Please try again.');
      }
    }

    function getCardColors(value) {
      // Maps T, C, E values to color scheme
      // Warm colors (red/orange) = more restrictive/high severity
      // Cool colors (blue/green) = more permissive/low severity
      
      const tierValue = parseInt(value[1]); // Extract number from T0-T5
      const level = value[0]; // T, C, or E
      
      if (level === 'T') {
        // T: 0-5 scale
        // T0-T1 = warm (restrictive), T4-T5 = cool (permissive)
        if (tierValue === 0) return { glow: 'rgba(239, 68, 68, 0.4)', border: '#ef4444' }; // T0: Red
        if (tierValue === 1) return { glow: 'rgba(249, 115, 22, 0.4)', border: '#f97316' }; // T1: Orange
        if (tierValue === 2) return { glow: 'rgba(245, 158, 11, 0.4)', border: '#f59e0b' }; // T2: Amber
        if (tierValue === 3) return { glow: 'rgba(132, 204, 22, 0.4)', border: '#84cc16' }; // T3: Lime
        if (tierValue === 4) return { glow: 'rgba(34, 197, 94, 0.4)', border: '#22c55e' }; // T4: Green
        if (tierValue === 5) return { glow: 'rgba(16, 185, 129, 0.4)', border: '#10b981' }; // T5: Emerald
      }
      
      if (level === 'C') {
        // C: 0-3 scale
        // C0 = cool (no docs needed), C3 = warm (full audit)
        if (tierValue === 0) return { glow: 'rgba(34, 197, 94, 0.4)', border: '#22c55e' }; // C0: Green
        if (tierValue === 1) return { glow: 'rgba(245, 158, 11, 0.4)', border: '#f59e0b' }; // C1: Amber
        if (tierValue === 2) return { glow: 'rgba(249, 115, 22, 0.4)', border: '#f97316' }; // C2: Orange
        if (tierValue === 3) return { glow: 'rgba(239, 68, 68, 0.4)', border: '#ef4444' }; // C3: Red
      }
      
      if (level === 'E') {
        // E: 0-2 scale
        // E0 = cool (trust-based), E2 = warm (investigative)
        if (tierValue === 0) return { glow: 'rgba(34, 197, 94, 0.4)', border: '#22c55e' }; // E0: Green
        if (tierValue === 1) return { glow: 'rgba(245, 158, 11, 0.4)', border: '#f59e0b' }; // E1: Amber
        if (tierValue === 2) return { glow: 'rgba(239, 68, 68, 0.4)', border: '#ef4444' }; // E2: Red
      }
      
      // Fallback
      return { glow: 'rgba(107, 114, 128, 0.4)', border: '#6b7280' };
    }

    function showResult() {
      document.getElementById('quiz-view').classList.add('hidden');
      document.getElementById('result-view').classList.remove('hidden');
      
      // Set policy text
      document.getElementById('policy-text').textContent = lastGeneratedPolicy.policy_text;
      
      // Set T/C/E display with glow cards
      const tierDisplay = lastGeneratedPolicy.tier_id;
      const complianceDisplay = lastGeneratedPolicy.compliance_id;
      const enforcementDisplay = lastGeneratedPolicy.enforcement_id;
      
      // Get colors based on severity
      const tierColors = getCardColors(tierDisplay);
      const complianceColors = getCardColors(complianceDisplay);
      const enforcementColors = getCardColors(enforcementDisplay);
      
      // Update T card
      document.getElementById('card-t').style.setProperty('--glow-color', tierColors.glow);
      document.getElementById('card-t').style.setProperty('--border-color', tierColors.border);
      document.getElementById('tier-display').textContent = tierDisplay;
      document.getElementById('tier-definition').textContent = TIER_DEFINITIONS[tierDisplay] || 'Tier Definition';
      
      // Update C card
      document.getElementById('card-c').style.setProperty('--glow-color', complianceColors.glow);
      document.getElementById('card-c').style.setProperty('--border-color', complianceColors.border);
      document.getElementById('compliance-display').textContent = complianceDisplay;
      document.getElementById('compliance-definition').textContent = COMPLIANCE_DEFINITIONS[complianceDisplay] || 'Compliance Definition';
      
      // Update E card
      document.getElementById('card-e').style.setProperty('--glow-color', enforcementColors.glow);
      document.getElementById('card-e').style.setProperty('--border-color', enforcementColors.border);
      document.getElementById('enforcement-display').textContent = enforcementDisplay;
      document.getElementById('enforcement-definition').textContent = ENFORCEMENT_DEFINITIONS[enforcementDisplay] || 'Enforcement Definition';
    }

    function backToQuiz() {
      document.getElementById('result-view').classList.add('hidden');
      document.getElementById('quiz-view').classList.remove('hidden');
    }

    function copyPolicy() {
      const policyText = document.getElementById('policy-text').textContent;
      const tierDisplay = document.getElementById('tier-display').textContent;
      const complianceDisplay = document.getElementById('compliance-display').textContent;
      const enforcementDisplay = document.getElementById('enforcement-display').textContent;
      
      // Combine all info for clipboard
      const fullText = `AI Policy

Tier: ${tierDisplay}
Compliance: ${complianceDisplay}
Enforcement: ${enforcementDisplay}

${policyText}`;
      
      // Copy to clipboard
      navigator.clipboard.writeText(fullText).then(() => {
        // Show success feedback
        const btn = document.getElementById('copy-btn');
        const originalText = btn.textContent;
        btn.textContent = '✓ Copied!';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy:', err);
        alert('Failed to copy to clipboard. Please try again.');
      });
    }

    // Load on page load
    window.addEventListener('load', () => {
      loadQuestions();
    });
  </script>

</body>
</html>
